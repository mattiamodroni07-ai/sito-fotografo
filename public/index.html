<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Condividi i tuoi ricordi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<style>
  .hero {
    padding: 56px 0 32px;
    text-align: center;
  }
  .hero h1 {
    font-size: clamp(32px, 8vw, 48px);
    margin: 10px 0 8px;
  }
  .hero p { color: var(--sage); font-size: 17px; }

  .upload-zone {
    border: 3px dashed var(--cream-deep);
    border-radius: var(--radius);
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s ease, background 0.2s ease;
    background: var(--white);
  }
  .upload-zone.drag-over {
    border-color: var(--terracotta);
    background: #FFF8EF;
  }
  .upload-zone svg { width: 48px; height: 48px; color: var(--terracotta); margin-bottom: 12px; }
  .upload-zone .main-text { font-weight: 600; font-size: 17px; margin-bottom: 4px; }
  .upload-zone .sub-text { color: var(--sage); font-size: 14px; }
  input[type="file"] { display: none; }

  .upload-status {
    text-align: center;
    font-weight: 600;
    font-size: 15px;
    margin-top: 16px;
    color: var(--sage);
    opacity: 0;
    transition: opacity 0.2s ease;
  }
  .upload-status.show { opacity: 1; }
  .upload-status.success { color: var(--sage); }
  .upload-status.error { color: var(--terracotta-deep); }

  .preview-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
    gap: 10px;
    margin: 20px 0;
  }
  .preview-item {
    position: relative;
    aspect-ratio: 1;
    border-radius: 10px;
    overflow: hidden;
    background: var(--cream-deep);
  }
  .preview-item img, .preview-item video {
    width: 100%; height: 100%; object-fit: cover;
  }
  .preview-item .remove {
    position: absolute; top: 4px; right: 4px;
    width: 22px; height: 22px;
    background: rgba(43,33,24,0.7);
    color: white; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; cursor: pointer; border: none;
  }
  .preview-item .progress-overlay {
    position: absolute; inset: 0;
    background: rgba(43,33,24,0.55);
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 13px; font-weight: 600;
  }
  .preview-item.done .progress-overlay { display: none; }

  .closed-state, .gallery-link-state {
    text-align: center;
    padding: 40px 24px;
  }
  .closed-state .icon, .gallery-link-state .icon { font-size: 40px; margin-bottom: 12px; }

  .toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: var(--cream);
    padding: 14px 24px;
    border-radius: 999px;
    font-weight: 600;
    font-size: 14px;
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
    box-shadow: var(--shadow-lift);
    max-width: 90vw;
    text-align: center;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="container">
  <div class="hero">
    <div class="eyebrow" id="event-eyebrow">Galleria condivisa</div>
    <h1 id="event-name">Caricamento…</h1>
    <p id="event-sub"></p>
  </div>

  <div id="app-content">
    <!-- Popolato via JS in base allo stato dell'evento -->
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/js/upload.js"></script>
</body>
</html>
