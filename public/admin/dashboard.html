<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I tuoi eventi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  .top-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 24px 0 8px;
  }
  .top-bar h1 { font-size: 26px; }
  .logout-link { color: var(--sage); font-size: 14px; font-weight: 600; }

  .event-card {
    display: flex; justify-content: space-between; align-items: center;
    gap: 16px;
    padding: 20px 24px;
    margin-bottom: 12px;
  }
  .event-info h3 { font-size: 18px; margin-bottom: 4px; }
  .event-meta { color: var(--sage); font-size: 14px; }
  .status-badge {
    display: inline-block;
    font-size: 12px; font-weight: 700;
    padding: 3px 10px; border-radius: 999px;
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .status-open { background: #E8F2E0; color: var(--sage); }
  .status-closed { background: #F2E6D3; color: var(--terracotta-deep); }
  .status-archived { background: #EEE; color: #888; }

  .event-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .icon-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 2px solid var(--cream-deep);
    background: white;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(20,15,10,0.5);
    display: none;
    align-items: center; justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal-box { background: white; border-radius: var(--radius); padding: 32px; max-width: 420px; width: 100%; }
  .modal-box h2 { font-size: 22px; margin-bottom: 18px; }

  #qr-canvas { display: flex; justify-content: center; margin: 20px 0; }
  .link-box {
    background: var(--cream-deep);
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 13px;
    word-break: break-all;
    margin-bottom: 16px;
  }

  .empty-state { text-align: center; padding: 48px 24px; color: var(--sage); }
</style>
</head>
<body>

<div class="container" style="max-width: 760px">
  <div class="top-bar">
    <h1>I tuoi eventi</h1>
    <a href="#" id="logout-link" class="logout-link">Esci</a>
  </div>

  <button class="btn btn-primary" id="new-event-btn" style="width:100%; margin: 12px 0 28px">
    + Crea nuovo evento
  </button>

  <div id="events-list"></div>
</div>

<!-- Modale: crea nuovo evento -->
<div class="modal-overlay" id="create-modal">
  <div class="modal-box">
    <h2>Nuovo evento</h2>
    <form id="create-form">
      <div class="field">
        <label for="event-name">Nome evento</label>
        <input type="text" id="event-name" placeholder="Es. Compleanno di Giulia" required>
      </div>
      <div class="field">
        <label for="event-date">Data evento</label>
        <input type="date" id="event-date" required>
      </div>
      <div class="row" style="margin-top: 20px">
        <button type="button" class="btn btn-ghost" id="cancel-create" style="flex:1">Annulla</button>
        <button type="submit" class="btn btn-primary" style="flex:1">Crea evento</button>
      </div>
    </form>
  </div>
</div>

<!-- Modale: QR code generato -->
<div class="modal-overlay" id="qr-modal">
  <div class="modal-box text-center">
    <h2 id="qr-event-name">Evento creato!</h2>
    <p style="color:var(--sage); margin-bottom: 8px">Condividi questo QR o il link con gli invitati</p>
    <div id="qr-canvas"></div>
    <div class="link-box" id="qr-link"></div>
    <button class="btn btn-primary" id="close-qr" style="width:100%">Fatto</button>
  </div>
</div>

<script src="/js/dashboard.js"></script>
</body>
</html>
