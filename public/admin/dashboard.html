<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>I tuoi eventi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  .top-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 28px 0 6px;
  }
  .top-bar h1 { font-size: 28px; }
  .logout-link { color: var(--sage); font-size: 14px; font-weight: 600; }

  /* ---- Event card (sola riga cliccabile) ---- */
  .event-card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow-soft);
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 16px;
    padding: 20px 24px;
    cursor: pointer; user-select: none;
    transition: box-shadow 0.2s ease, transform 0.15s ease;
  }
  .event-card:hover { box-shadow: var(--shadow-lift); transform: translateY(-1px); }
  .event-card:active { transform: scale(0.99); }
  .event-info { flex: 1; min-width: 0; }
  .event-info h3 { font-size: 18px; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .event-meta { color: var(--sage); font-size: 13px; }

  .status-badge {
    display: inline-block; font-size: 11px; font-weight: 700;
    padding: 2px 9px; border-radius: 999px;
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .status-open    { background: #E8F2E0; color: #4A6B3A; }
  .status-closed  { background: #F2E6D3; color: var(--terracotta-deep); }
  .status-archived{ background: #EEE;   color: #888; }

  .card-arrow { flex-shrink: 0; color: var(--sage); }
  .card-arrow svg { width: 22px; height: 22px; display: block; }

  /* ---- Finestre modali (overlay) ---- */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(20,15,10,0.55);
    -webkit-backdrop-filter: blur(3px); backdrop-filter: blur(3px);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 20px;
    opacity: 0; visibility: hidden; pointer-events: none;
    transition: opacity 0.22s ease, visibility 0.22s ease;
  }
  .modal-overlay.show { opacity: 1; visibility: visible; pointer-events: auto; }

  .modal-box {
    background: var(--white); border-radius: var(--radius);
    padding: 30px; max-width: 440px; width: 100%;
    box-shadow: var(--shadow-lift);
    transform: translateY(14px) scale(0.98);
    transition: transform 0.25s ease;
  }
  .modal-overlay.show .modal-box { transform: none; }
  .modal-box h2 { font-size: 22px; margin-bottom: 18px; }

  /* La finestra dettaglio scorre TUTTA (overlay scrollabile): pattern
     affidabile su ogni browser, niente scroll-container interno. */
  #detail-modal {
    display: block;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 0;
  }
  .detail-box {
    max-width: 720px; padding: 0;
    margin: 5vh auto;
    display: block; overflow: visible;
  }
  /* La testata resta visibile in alto mentre si scorre */
  .detail-head {
    position: sticky; top: 0; z-index: 5;
    background: var(--white);
    border-radius: var(--radius) var(--radius) 0 0;
  }
  /* Su mobile la finestra è a tutto schermo */
  @media (max-width: 760px) {
    .detail-box {
      max-width: 100%; margin: 0; min-height: 100%;
      border-radius: 0;
    }
    .detail-head { border-radius: 0; }
  }
  .detail-head {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 24px 26px 16px;
    border-bottom: 1px solid var(--cream-deep);
    flex-shrink: 0;
  }
  .detail-head-info { flex: 1; min-width: 0; }
  .detail-head h2 { font-size: 21px; margin-bottom: 6px; word-break: break-word; }
  .detail-close {
    flex-shrink: 0; width: 34px; height: 34px; border-radius: 50%;
    border: none; background: var(--cream-deep); color: var(--ink);
    font-size: 20px; line-height: 1; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s ease;
  }
  .detail-close:hover { background: #E6D6BE; }

  /* Corpo della finestra: scorre insieme a tutto l'overlay */
  .detail-scroll { padding: 0 26px 26px; }

  .detail-section { padding: 20px 0; }
  .detail-section + .detail-section { border-top: 1px solid var(--cream-deep); }
  .section-title {
    font-family: var(--font-body);
    font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--sage); margin-bottom: 14px;
  }
  .section-title.danger { color: #C0392B; }

  .field textarea {
    width: 100%; padding: 12px 16px;
    border: 2px solid var(--cream-deep); border-radius: 12px;
    font-family: var(--font-body); font-size: 15px;
    background: var(--white); color: var(--ink);
    resize: vertical; line-height: 1.5;
    transition: border-color 0.15s ease;
  }
  .field textarea:focus { outline: none; border-color: var(--terracotta); }

  .qr-box { display: flex; justify-content: center; margin-bottom: 14px; }
  .qr-box canvas, .qr-box img { border-radius: 10px; }
  .link-box {
    background: var(--cream-deep); border-radius: 10px;
    padding: 11px 15px; font-size: 13px; word-break: break-all;
    color: var(--ink); margin-bottom: 12px;
  }

  .toggle-row { display: flex; align-items: center; gap: 16px; }
  .toggle-row > div { flex: 1; }
  .toggle-label { font-weight: 600; font-size: 15px; margin-bottom: 3px; }
  .toggle-note { font-size: 13px; color: var(--sage); }

  /* Griglia foto a mosaico (come la galleria) */
  .photo-grid { columns: 2; column-gap: 10px; }
  @media (min-width: 560px) { .photo-grid { columns: 3; } }
  .grid-item {
    break-inside: avoid; margin-bottom: 10px;
    border-radius: 10px; overflow: hidden;
    background: var(--cream-deep);
    position: relative; cursor: pointer; display: block;
  }
  .grid-item img, .grid-item video { width: 100%; height: auto; display: block; }
  .grid-item .video-badge {
    position: absolute; bottom: 6px; left: 6px;
    background: rgba(20,15,10,0.65); border-radius: 5px;
    padding: 1px 6px; font-size: 11px; color: white; pointer-events: none;
  }
  /* Bottoni sempre visibili sopra ogni foto */
  .grid-overlay { position: absolute; top: 6px; right: 6px; display: flex; gap: 6px; z-index: 2; }
  .grid-btn {
    width: 34px; height: 34px; border-radius: 9px; border: none;
    background: rgba(20,15,10,0.55); color: #fff; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px);
    transition: transform 0.12s ease, background 0.15s ease;
  }
  .grid-btn svg { width: 16px; height: 16px; }
  .grid-btn:active { transform: scale(0.9); }
  .grid-btn:hover { background: rgba(20,15,10,0.75); }
  .grid-btn--del { background: rgba(217,56,38,0.82); }
  .grid-btn--del:hover { background: rgba(184,47,28,0.95); }
  .strip-empty { color: var(--sage); font-size: 14px; padding: 6px 0; }
  .count-badge {
    background: var(--cream-deep); border-radius: 999px;
    padding: 1px 8px; font-size: 11px; font-weight: 700;
    color: var(--sage); margin-left: 6px; vertical-align: middle;
  }

  .btn-danger {
    background: transparent; color: #C0392B;
    border: 2px solid #F2C9C5; padding: 13px 28px;
    border-radius: 999px; font-family: var(--font-body);
    font-weight: 600; font-size: 15px; cursor: pointer;
    width: 100%; transition: background 0.15s ease;
  }
  .btn-danger:hover { background: #FDEAE8; }
  .delete-confirm { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .delete-confirm-label { flex: 1; font-size: 14px; font-weight: 600; color: #C0392B; min-width: 130px; }
  .btn-confirm-del {
    background: #C0392B; color: white; border: none;
    padding: 11px 20px; border-radius: 999px;
    font-family: var(--font-body); font-weight: 600; font-size: 14px; cursor: pointer;
  }
  .save-feedback { color: var(--sage); font-size: 13px; font-weight: 600; text-align: center; margin-top: 8px; min-height: 16px; }

  /* ---- Lightbox foto ---- */
  .lb {
    position: fixed; inset: 0;
    background: rgba(20,15,10,0.96);
    z-index: 200;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; visibility: hidden; pointer-events: none;
    transition: opacity 0.25s ease, visibility 0.25s ease;
  }
  .lb.show { opacity: 1; visibility: visible; pointer-events: auto; }
  .lb-media-wrap { display: flex; align-items: center; justify-content: center; max-width: 92vw; max-height: 88vh; }
  .lb-media-wrap img, .lb-media-wrap video {
    max-width: 100%; max-height: 88vh; border-radius: 8px; object-fit: contain;
    user-select: none; display: block;
  }
  .lb-close {
    position: absolute; top: 18px; right: 20px;
    background: none; border: none; color: white;
    font-size: 34px; cursor: pointer; line-height: 1; opacity: 0.85;
  }
  .lb-nav {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: rgba(255,255,255,0.14); border: none; color: white;
    width: 46px; height: 46px; border-radius: 50%; cursor: pointer; font-size: 22px;
    display: flex; align-items: center; justify-content: center;
    -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px);
  }
  .lb-prev { left: 16px; } .lb-next { right: 16px; }
  .lb-count {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.55); font-size: 13px; font-weight: 600; pointer-events: none;
  }

  .empty-state { text-align: center; padding: 48px 24px; color: var(--sage); }
</style>
</head>
<body>

<div class="container" style="max-width: 720px">
  <div class="top-bar">
    <h1>I tuoi eventi</h1>
    <a href="#" id="logout-link" class="logout-link">Esci →</a>
  </div>

  <button class="btn btn-primary" id="new-event-btn" style="width:100%; margin: 12px 0 28px">
    + Nuovo evento
  </button>

  <div id="events-list"></div>
</div>

<!-- Finestra: crea nuovo evento -->
<div class="modal-overlay" id="create-modal">
  <div class="modal-box">
    <h2>Nuovo evento</h2>
    <form id="create-form">
      <div class="field">
        <label for="new-name">Nome evento</label>
        <input type="text" id="new-name" placeholder="Es. Compleanno di Giulia" required>
      </div>
      <div class="field">
        <label for="new-date">Data evento</label>
        <input type="date" id="new-date" required>
      </div>
      <div class="row" style="margin-top: 20px">
        <button type="button" class="btn btn-ghost" id="cancel-create" style="flex:1">Annulla</button>
        <button type="submit" class="btn btn-primary" id="create-submit" style="flex:1">Crea evento</button>
      </div>
    </form>
  </div>
</div>

<!-- Finestra: dettaglio evento -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal-box detail-box">
    <div class="detail-head">
      <div class="detail-head-info">
        <h2 id="detail-name">Evento</h2>
        <span class="status-badge" id="detail-status">Aperto</span>
      </div>
      <button class="detail-close" id="detail-close" aria-label="Chiudi">×</button>
    </div>
    <div class="detail-scroll" id="detail-scroll">
      <!-- Popolato via JS -->
    </div>
  </div>
</div>

<!-- Lightbox foto -->
<div class="lb" id="lb" role="dialog" aria-modal="true">
  <button class="lb-close" id="lb-close" aria-label="Chiudi">×</button>
  <button class="lb-nav lb-prev" id="lb-prev" aria-label="Precedente">‹</button>
  <div class="lb-media-wrap" id="lb-media"></div>
  <button class="lb-nav lb-next" id="lb-next" aria-label="Successivo">›</button>
  <div class="lb-count" id="lb-count"></div>
</div>

<script src="/js/dashboard.js"></script>
</body>
</html>
