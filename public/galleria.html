<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galleria evento</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<style>
  .hero { padding: 40px 0 24px; text-align: center; }
  .hero h1 { font-size: clamp(28px, 7vw, 40px); margin: 10px 0 6px; }
  .hero p { color: var(--sage); }

  /* Layout a mosaico (masonry): le foto si vedono intere, non ritagliate */
  .gallery-grid {
    columns: 2;
    column-gap: 12px;
    margin: 24px 0;
  }
  @media (min-width: 600px) { .gallery-grid { columns: 3; } }
  @media (min-width: 920px) { .gallery-grid { columns: 4; } }

  .gallery-item {
    break-inside: avoid;
    margin-bottom: 12px;
    border-radius: 12px;
    overflow: hidden;
    background: var(--cream-deep);
    cursor: pointer;
    position: relative;
    display: block;
  }
  .gallery-item img, .gallery-item video {
    width: 100%; height: auto; display: block;
    transition: transform 0.35s ease;
  }
  .gallery-item:hover img, .gallery-item:hover video { transform: scale(1.04); }

  /* Animazione d'ingresso allo scroll (disattivata se l'utente preferisce meno movimento) */
  @media (prefers-reduced-motion: no-preference) {
    .gallery-item.animate {
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .gallery-item.animate.in { opacity: 1; transform: none; }
  }

  /* Filtro Foto / Video */
  .filter-bar { display: flex; gap: 8px; margin: 4px 0 0; flex-wrap: wrap; }
  .chip {
    padding: 8px 16px;
    border-radius: 999px;
    border: 2px solid var(--cream-deep);
    background: var(--white);
    color: var(--ink);
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .chip:hover { border-color: var(--terracotta); }
  .chip.is-active { background: var(--terracotta); color: var(--white); border-color: var(--terracotta); }

  /* Comandi sempre visibili (no hover): pensati per il tocco su smartphone */
  .item-overlay {
    position: absolute;
    top: 6px; right: 6px;
    display: flex;
    gap: 6px;
    z-index: 2;
  }
  .item-btn {
    width: 36px; height: 36px;
    border-radius: 9px;
    border: none;
    background: rgba(20, 15, 10, 0.55);
    color: #fff;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    -webkit-backdrop-filter: blur(4px);
    backdrop-filter: blur(4px);
    transition: transform 0.12s ease, background 0.15s ease;
    flex-shrink: 0;
  }
  .item-btn svg { width: 17px; height: 17px; }
  .item-btn:active { transform: scale(0.9); }
  .item-btn:hover { background: rgba(20, 15, 10, 0.75); }
  .item-btn--danger { background: rgba(217, 56, 38, 0.8); }
  .item-btn--danger:hover { background: rgba(184, 47, 28, 0.92); }

  .empty-state { text-align: center; padding: 48px 24px; color: var(--sage); }
  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }

  .lightbox {
    position: fixed; inset: 0;
    background: rgba(20, 15, 10, 0.92);
    display: flex;
    align-items: center; justify-content: center;
    z-index: 100;
    padding: 24px;
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    transition: opacity 0.25s ease, visibility 0.25s ease;
  }
  .lightbox.show { opacity: 1; visibility: visible; pointer-events: auto; }
  .lightbox img, .lightbox video {
    max-width: 100%; max-height: 90vh; border-radius: 8px;
    transform: scale(0.94);
    transition: transform 0.25s ease;
  }
  .lightbox.show img, .lightbox.show video { transform: scale(1); }
  .lightbox .close-btn {
    position: absolute; top: 20px; right: 24px;
    color: white; font-size: 32px; background: none; border: none; cursor: pointer; z-index: 2;
  }
  /* Navigazione tra le foto: frecce + swipe */
  .lb-nav {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: rgba(255,255,255,0.14); border: none; color: white;
    width: 46px; height: 46px; border-radius: 50%; cursor: pointer; font-size: 22px;
    display: flex; align-items: center; justify-content: center;
    -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px);
    transition: background 0.15s ease; z-index: 2;
  }
  .lb-nav:hover { background: rgba(255,255,255,0.28); }
  .lb-prev { left: 16px; } .lb-next { right: 16px; }
  .lb-count {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.55); font-size: 13px; font-weight: 600; pointer-events: none;
  }
</style>
</head>
<body>

<div class="container">
  <div class="hero">
    <div class="eyebrow">Galleria condivisa</div>
    <h1 id="event-name">Caricamento…</h1>
    <p id="event-count"></p>
  </div>

  <div class="top-bar">
    <a href="javascript:history.back()" class="btn btn-ghost">← Torna indietro</a>
    <a id="zip-link" class="btn btn-primary" style="display:none">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Scarica tutto (.zip)
    </a>
  </div>

  <div class="filter-bar" id="filter-bar" style="display:none">
    <button class="chip is-active" data-filter="all">Tutti</button>
    <button class="chip" data-filter="image">Foto</button>
    <button class="chip" data-filter="video">Video</button>
  </div>

  <div id="gallery-content"></div>
</div>

<div class="lightbox" id="lightbox">
  <button class="close-btn" id="lightbox-close">×</button>
  <button class="lb-nav lb-prev" id="lb-prev" aria-label="Precedente">‹</button>
  <div id="lightbox-media"></div>
  <button class="lb-nav lb-next" id="lb-next" aria-label="Successivo">›</button>
  <div class="lb-count" id="lb-count"></div>
</div>

<script src="/js/gallery.js"></script>
</body>
</html>
