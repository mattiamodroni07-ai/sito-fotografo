<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Galleria evento</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/photoswipe@5/dist/photoswipe.css">
<style>
  .hero { padding: 56px 0 22px; text-align: center; }
  .hero .eyebrow { display: inline-block; margin-bottom: 12px; }
  .hero h1 {
    font-size: clamp(32px, 8vw, 52px);
    font-weight: 700;
    line-height: 1.04;
    background: linear-gradient(180deg, var(--cream), #C9A98A);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .hero p { color: var(--muted); margin-top: 8px; font-size: 15px; }

  .top-bar { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin: 14px 0 4px; }

  .filter-bar { display: flex; gap: 8px; margin: 18px 0 4px; flex-wrap: wrap; }
  .chip {
    padding: 9px 18px; border-radius: 999px;
    border: 1.5px solid var(--line-strong);
    background: var(--glass); color: var(--cream-dim);
    font-family: var(--font-body); font-weight: 600; font-size: 14px;
    cursor: pointer; transition: all 0.18s var(--ease-out);
    -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
  }
  .chip:hover { border-color: var(--terracotta); color: var(--cream); }
  .chip.is-active {
    background: linear-gradient(135deg, var(--terracotta), var(--terracotta-deep));
    color: #1a120c; border-color: transparent;
    box-shadow: 0 8px 22px rgba(226,122,75,0.35);
  }

  /* Mosaico */
  .gallery-grid { columns: 2; column-gap: 14px; margin: 22px 0 60px; }
  @media (min-width: 600px) { .gallery-grid { columns: 3; } }
  @media (min-width: 980px) { .gallery-grid { columns: 4; } }

  .gallery-item {
    break-inside: avoid; margin-bottom: 14px;
    border-radius: 14px; overflow: hidden;
    background: var(--surface);
    border: 1px solid var(--line);
    cursor: pointer; position: relative; display: block;
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    transition: transform 0.3s var(--ease-out), box-shadow 0.3s var(--ease-out), border-color 0.3s ease;
  }
  .gallery-item:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-lift);
    border-color: var(--line-strong);
  }
  .gallery-item img, .gallery-item video {
    width: 100%; height: auto; display: block;
    transition: transform 0.5s var(--ease-out), filter 0.4s ease;
  }
  .gallery-item:hover img, .gallery-item:hover video { transform: scale(1.05); }
  .gallery-item .grad {
    position: absolute; inset: 0; pointer-events: none;
    background: linear-gradient(to top, rgba(10,7,4,0.45), transparent 38%);
    opacity: 0; transition: opacity 0.3s ease;
  }
  .gallery-item:hover .grad { opacity: 1; }
  .gallery-item .video-badge {
    position: absolute; bottom: 8px; left: 8px;
    background: rgba(10,7,4,0.6); border-radius: 6px;
    padding: 2px 8px; font-size: 11px; color: #fff; pointer-events: none;
    -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px);
  }

  /* Animazione d'ingresso (impostata da GSAP; fallback CSS sotto) */
  .gallery-item { will-change: transform, opacity; }

  /* Comandi sempre visibili (tocco mobile) */
  .item-overlay { position: absolute; top: 8px; right: 8px; display: flex; gap: 6px; z-index: 2; }
  .item-btn {
    width: 36px; height: 36px; border-radius: 10px; border: none;
    background: rgba(10,7,4,0.5); color: #fff; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.12);
    transition: transform 0.12s ease, background 0.18s ease;
  }
  .item-btn svg { width: 17px; height: 17px; }
  .item-btn:active { transform: scale(0.88); }
  .item-btn:hover { background: rgba(10,7,4,0.72); }
  .item-btn--danger { background: rgba(217,56,38,0.72); border-color: rgba(255,255,255,0.18); }
  .item-btn--danger:hover { background: rgba(184,47,28,0.92); }

  .empty-state {
    text-align: center; padding: 64px 24px; color: var(--muted);
    border: 1px dashed var(--line-strong); border-radius: var(--radius);
    background: var(--glass);
  }

  /* PhotoSwipe: contenuto video custom */
  .pswp-video-wrap { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }
  .pswp-video-wrap video { max-width: 92vw; max-height: 86vh; border-radius: 8px; outline: none; }
  .pswp__bg { background: #0b0805; }
</style>
</head>
<body>

<div class="container">
  <div class="hero">
    <div class="eyebrow">Galleria condivisa</div>
    <h1 id="event-name">Caricamento…</h1>
    <p id="event-count"></p>
  </div>

  <div class="top-bar">
    <a href="javascript:history.back()" class="btn btn-ghost">← Indietro</a>
    <a id="zip-link" class="btn btn-primary" style="display:none">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Scarica tutto (.zip)
    </a>
  </div>

  <div class="filter-bar" id="filter-bar" style="display:none">
    <button class="chip is-active" data-filter="all">Tutti</button>
    <button class="chip" data-filter="image">Foto</button>
    <button class="chip" data-filter="video">Video</button>
  </div>

  <div id="gallery-content"></div>
</div>

<!-- GSAP + ScrollTrigger + Lenis (smooth scroll) -->
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lenis@1.1.13/dist/lenis.min.js"></script>
<script type="module" src="/js/gallery.js"></script>
</body>
</html>
